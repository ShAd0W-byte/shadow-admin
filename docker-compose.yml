version: "3.9"

services:

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: shadow
      POSTGRES_PASSWORD: shadowpass
      POSTGRES_DB: shadowdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://shadow:shadowpass@db:5432/shadowdb
    ports:
      - "8000:8000"

volumes:
  postgres_data:
